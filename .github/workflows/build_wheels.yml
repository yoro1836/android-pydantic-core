Name: Android Wheels & Release

on:
  workflow_dispatch:
    inputs:
      custom_version:
        description: 'Target version to build (e.g. 2.46.4). Leave empty for latest.'
        required: false
        default: ''
        type: string
      force_build:
        description: 'Force build even if release exists'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 0 1 * *'

env:
  PACKAGE_NAME: pydantic-core
  NDK_VERSION: '25.2.9519653'
  ANDROID_API: 24

permissions:
  contents: write 

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pypi.outputs.version }}
      should_build: ${{ steps.check_release.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
      
      - id: pypi
        name: Get Target Version
        run: |
          INPUT_VER="${{ inputs.custom_version }}"
          if [ -z "$INPUT_VER" ]; then
            VER=$(curl -s https://pypi.org/pypi/${{ env.PACKAGE_NAME }}/json | python3 -c "import sys, json; print(json.load(sys.stdin)['info']['version'])")
          else
            VER="$INPUT_VER"
          fi
          echo "Target version: $VER"
          echo "version=$VER" >> $GITHUB_OUTPUT

      - id: check_release
        name: Check if Release Exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ inputs.force_build }}
        run: |
          VER="${{ steps.pypi.outputs.version }}"
          TAG="v$VER"
          
          if [ "$FORCE" == "true" ] || [ ! -z "${{ inputs.custom_version }}" ]; then
            echo "Force build or custom version enabled."
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "Release $TAG not found. Starting build."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
